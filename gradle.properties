# Gradle
gradleVersion=9.2.1
org.gradle.parallel=true
# Enable Gradle Configuration Cache -> https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache=true
# Enable Gradle Build Cache -> https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true
# Disable IntelliJ Platform Gradle Plugin update check
org.jetbrains.intellij.platform.selfUpdateCheck=false
# https://plugins.jetbrains.com/docs/intellij/build-number-ranges.html#intellij-platform-based-products-of-recent-ide-versions
jvmVersion=21
#
# Plugin
group=io.github.l2dy
repository=https://github.com/l2dy/intellij-nginx-plugin
pluginName=NGINX Configuration Language
version=2026.1.12
# https://plugins.jetbrains.com/docs/intellij/kotlin.html#kotlin-standard-library
kotlin.stdlib.default.dependency=false
#
# Platform
platformSinceBuild=252
# Develop platform
platformVersion=2025.3.2
platformType=PY
plugins=com.cppcxy.Intellij-EmmyLua
#platformBundledPlugins=PythonCore
#
# Publish
publishChannel=Stable
#
# Nginx
nginxVersion=1.29.1
